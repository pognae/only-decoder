model:
  vocab_size: 4000
  hidden_size: 256
  intermediate_size: 1024
  num_hidden_layers: 6
  num_attention_heads: 8
  num_key_value_heads: 4
  max_position_embeddings: 1024
  bos_token_id: 1
  eos_token_id: 2
  pad_token_id: 0

training:
  max_length: 512
  learning_rate: 3.0e-4
  num_train_epochs: 3
  per_device_train_batch_size: 2
  per_device_eval_batch_size: 2
  gradient_accumulation_steps: 8
  logging_steps: 10
  save_steps: 100
  eval_steps: 100
  warmup_ratio: 0.03
  weight_decay: 0.01
